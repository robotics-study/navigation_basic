# Four agents swapping sides through a shared central region: one horizontal
# pair and one vertical pair crossing perpendicular. A literal circular
# antipodal swap (all agents converging on one center point) is a genuine
# deadlock for VO/RVO/ORCA -- perfect rotational symmetry leaves every agent's
# candidate velocities blocked equally, so the group freezes (exactly the
# crowded-symmetry failure the RVO/ORCA weakness sections describe). The
# perpendicular X-crossing with a 0.9 m per-lane offset keeps genuine 4-body
# reciprocal avoidance while breaking that symmetry, so all four resolve and
# reach with comfortable clearance.
map: ../../grid/open_arena.yaml
agents:
  - {start: [1.5, 6.6], theta: 0.0,     goal: [13.5, 6.6], radius: 0.3}
  - {start: [13.5, 8.4], theta: 3.14159, goal: [1.5, 8.4], radius: 0.3}
  - {start: [6.6, 3.0], theta: 1.5708,  goal: [6.6, 12.0], radius: 0.3}
  - {start: [8.4, 12.0], theta: -1.5708, goal: [8.4, 3.0], radius: 0.3}
