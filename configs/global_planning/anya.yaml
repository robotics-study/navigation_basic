algorithm: anya
category: global_planning
params:
  - name: heuristic_weight
    type: float
    default: 1.0
    min: 1.0
    max: 5.0
    description: >-
      f = g + w*h 의 가중치 (h 는 유클리드 직선거리). 1.0 이면 최적 any-angle (Anya),
      1.0 초과면 weighted (더 빠르지만 준최적 — 최적성 보장 상실).
      (Harabor, Grastien, Öz & Aksakalli 2016; weighted: Pohl 1970)
