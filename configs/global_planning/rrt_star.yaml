algorithm: rrt_star
category: global_planning
params:
  - name: max_iterations
    type: int
    default: 8000
    min: 1
    max: 200000
    description: 최대 확장 반복 수 (anytime; 소진 시 현재 best 반환).
  - name: step_size
    type: float
    default: 0.5
    min: 0.01
    max: 100.0
    description: steer 확장 거리 eta (meters).
  - name: goal_bias
    type: float
    default: 0.05
    min: 0.0
    max: 1.0
    description: 매 반복 goal 을 직접 sample 할 확률 (0~1).
  - name: goal_tolerance
    type: float
    default: 0.3
    min: 0.0
    max: 100.0
    description: goal 도달 판정 반경 (meters).
  - name: neighbor_radius
    type: float
    default: 1.5
    min: 0.01
    max: 100.0
    description: choose-parent / rewire 근방 반경 (meters). radius_mode=fixed 일 때 사용. (Karaman & Frazzoli 2011)
  - name: radius_mode
    type: enum
    default: fixed
    choices: [fixed, shrinking]
    description: >-
      근방 반경 모드. fixed 는 상수 neighbor_radius, shrinking 은 트리 크기에 따라
      줄어드는 rₙ=γ(log n/n)^(1/d) 를 쓴다. (Karaman & Frazzoli 2011)
  - name: rgg_gamma
    type: float
    default: 2.0
    min: 0.01
    max: 100.0
    description: shrinking 반경의 γ 계수. radius_mode=shrinking 일 때만 사용. (Karaman & Frazzoli 2011)
  - name: seed
    type: int
    default: 1
    min: 0
    max: 2147483647
    description: 난수 시드 (재현성).
