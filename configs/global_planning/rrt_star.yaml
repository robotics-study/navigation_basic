algorithm: rrt_star
category: global_planning
params:
  - name: max_iterations
    type: int
    default: 8000
    min: 1
    max: 200000
    description: 최대 확장 반복 수 (anytime; 소진 시 현재 best 반환).
  - name: step_size
    type: float
    default: 0.5
    min: 0.01
    max: 100.0
    description: steer 확장 거리 eta (meters).
  - name: goal_bias
    type: float
    default: 0.05
    min: 0.0
    max: 1.0
    description: 매 반복 goal 을 직접 sample 할 확률 (0~1).
  - name: goal_tolerance
    type: float
    default: 0.3
    min: 0.0
    max: 100.0
    description: goal 도달 판정 반경 (meters).
  - name: neighbor_radius
    type: float
    default: 1.5
    min: 0.01
    max: 100.0
    description: choose-parent / rewire 근방 반경 (meters). (Karaman & Frazzoli 2011)
  - name: seed
    type: int
    default: 1
    min: 0
    max: 2147483647
    description: 난수 시드 (재현성).
