algorithm: regulated_pure_pursuit
category: local_planning
params:
  - name: lookahead_time
    type: float
    default: 1.0
    min: 0.01
    max: 10.0
    description: adaptive lookahead 시간 상수 t_l (seconds). L_d = t_l * v. (Macenski et al. 2023; Campbell 2007)
  - name: min_lookahead
    type: float
    default: 0.25
    min: 0.01
    max: 100.0
    description: L_d 하한 (meters). v=0 (정지) 에서도 이 값을 쓴다.
  - name: max_lookahead
    type: float
    default: 1.0
    min: 0.01
    max: 100.0
    description: L_d 상한 (meters). min_lookahead 보다 작게 선언되면 이 값이 이긴다 (clamp 순서 min(max(L_d, min_lookahead), max_lookahead)).
  - name: regulated_min_radius
    type: float
    default: 0.9
    min: 0.001
    max: 100.0
    description: 곡률 규제가 발동하는 회전 반경 r_min (meters). 명령 반경이 이보다 작아지면 속도를 반경에 비례해 낮춘다.
  - name: proximity_distance
    type: float
    default: 0.6
    min: 0.01
    max: 100.0
    description: 근접 규제가 발동하는 장애물 거리 (meters). EDT 거리가 이보다 가까워지면 속도를 거리에 비례해 낮춘다.
  - name: min_regulated_speed
    type: float
    default: 0.1
    min: 0.0
    max: 10.0
    description: 규제(곡률/근접) 적용 후 속도 하한 (m/s). 충돌 예측 정지에는 적용하지 않는다.
  - name: collision_check_step
    type: float
    default: 0.05
    min: 0.005
    max: 1.0
    description: 명령 원호를 따라 충돌을 검사하는 호길이 간격 (meters). (Macenski et al. 2023)
  - name: max_speed
    type: float
    default: 0.8
    min: 0.01
    max: 10.0
    description: 최대 전진 속도 (m/s).
  - name: max_omega
    type: float
    default: 1.5
    min: 0.01
    max: 20.0
    description: 최대 각속도 (rad/s).
  - name: slow_radius
    type: float
    default: 0.5
    min: 0.001
    max: 100.0
    description: goal 로부터 이 반경 이내에서 속도를 선형 감속 (meters).
  # --- shared closed-loop simulator block (identical defaults across every
  # local_planning algo; param_schema.json has no separate "sim" section, so
  # these live as ordinary params entries like the algorithm params above) ---
  - name: control_dt
    type: float
    default: 0.1
    min: 0.001
    max: 1.0
    description: 제어 주기 (seconds).
  - name: max_steps
    type: int
    default: 1000
    min: 1
    max: 100000
    description: 최대 tick 수 (소진 시 TIMEOUT).
  - name: goal_tolerance
    type: float
    default: 0.3
    min: 0.01
    max: 5.0
    description: goal 도달 판정 반경 (meters).
  - name: footprint_radius
    type: float
    default: 0.2
    min: 0.01
    max: 5.0
    description: 로봇 충돌 footprint 반경 (meters).
  - name: stall_window
    type: int
    default: 20
    min: 1
    max: 100000
    description: 정체 판정 sliding window 길이 (ticks).
  - name: stall_distance
    type: float
    default: 0.05
    min: 0.0
    max: 5.0
    description: stall_window 구간 순변위가 이 이하이면 STALLED (meters).
