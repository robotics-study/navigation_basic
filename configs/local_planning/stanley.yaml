algorithm: stanley
category: local_planning
params:
  - name: k_gain
    type: float
    default: 2.5
    min: 0.01
    max: 100.0
    description: crosstrack gain k (1/s). (Thrun et al. 2006)
  - name: k_soft
    type: float
    default: 0.5
    min: 0.001
    max: 10.0
    description: 저속 특이점 softening 상수 (m/s). (Hoffmann et al. 2007)
  - name: wheelbase
    type: float
    default: 0.3
    min: 0.01
    max: 10.0
    description: 가상 축간거리 L (meters). 전륜축 오차 기준점 계산에 사용.
  - name: max_steer
    type: float
    default: 1.2
    min: 0.01
    max: 1.55
    description: 조향각 한계 delta_max (rad). pi/2 미만이라 tan 발산을 차단한다.
  - name: max_speed
    type: float
    default: 0.8
    min: 0.01
    max: 10.0
    description: 최대 전진 속도 (m/s).
  - name: max_omega
    type: float
    default: 1.5
    min: 0.01
    max: 20.0
    description: 최대 각속도 (rad/s). 조향각-각속도 변환 후 클램프 한계.
  - name: slow_radius
    type: float
    default: 0.5
    min: 0.001
    max: 100.0
    description: goal 로부터 이 반경 이내에서 속도를 선형 감속 (meters).
  # --- shared closed-loop simulator block (identical defaults across every
  # local_planning algo; param_schema.json has no separate "sim" section, so
  # these live as ordinary params entries like the algorithm params above) ---
  - name: control_dt
    type: float
    default: 0.1
    min: 0.001
    max: 1.0
    description: 제어 주기 (seconds).
  - name: max_steps
    type: int
    default: 1000
    min: 1
    max: 100000
    description: 최대 tick 수 (소진 시 TIMEOUT).
  - name: goal_tolerance
    type: float
    default: 0.3
    min: 0.01
    max: 5.0
    description: goal 도달 판정 반경 (meters).
  - name: footprint_radius
    type: float
    default: 0.2
    min: 0.01
    max: 5.0
    description: 로봇 충돌 footprint 반경 (meters).
  - name: stall_window
    type: int
    default: 20
    min: 1
    max: 100000
    description: 정체 판정 sliding window 길이 (ticks).
  - name: stall_distance
    type: float
    default: 0.05
    min: 0.0
    max: 5.0
    description: stall_window 구간 순변위가 이 이하이면 STALLED (meters).
