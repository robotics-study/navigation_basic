algorithm: mpc
category: local_planning
params:
  - name: horizon
    type: int
    default: 20
    min: 3
    max: 60
    description: 예측 스텝 수 H (receding horizon 길이). (Klančar & Škrjanc 2007)
  - name: iterations
    type: int
    default: 10
    min: 1
    max: 100
    description: tick당 경사하강 반복 횟수 (고정, early-exit 없음).
  - name: step_alpha
    type: float
    default: 0.3
    min: 0.0001
    max: 10.0
    description: 경사하강 학습률.
  - name: grad_eps
    type: float
    default: 0.02
    min: 0.001
    max: 0.5
    description: >-
      중앙차분 gradient 섭동 크기. 장애물 항이 연속 nearest-occupied 거리라 셀 스케일보다
      작은 섭동에도 유효한 gradient가 나온다.
  - name: max_step_v
    type: float
    default: 0.2
    min: 0.001
    max: 2.0
    description: v 성분 1회 반복 step clamp (m/s).
  - name: max_step_omega
    type: float
    default: 0.4
    min: 0.001
    max: 5.0
    description: omega 성분 1회 반복 step clamp (rad/s).
  - name: w_goal
    type: float
    default: 2.0
    min: 0.0
    max: 100.0
    description: goal 거리 2차 비용 가중치. (mppi.yaml과 동일 기본값 — 같은 비용판 비교)
  - name: w_obstacle
    type: float
    default: 25.0
    min: 0.0
    max: 1000.0
    description: 장애물 hinge^2 페널티 가중치. (mppi.yaml과 동일)
  - name: w_control
    type: float
    default: 0.05
    min: 0.0
    max: 100.0
    description: 제어 노력 정규화 가중치. (mppi.yaml과 동일)
  - name: min_obstacle_dist
    type: float
    default: 0.8
    min: 0.1
    max: 3.0
    description: >-
      장애물 페널티가 활성화되는 거리 d_min (meters). 최근접 occupied cell까지의 연속
      거리로 clearance를 계산한다. (mppi.yaml과 동일)
  - name: v_max
    type: float
    default: 0.8
    min: 0.1
    max: 2.0
    description: 최대 전진 속도 (m/s, 전진 전용).
  - name: omega_max
    type: float
    default: 1.5
    min: 0.1
    max: 5.0
    description: 최대 각속도 (rad/s). (mppi.yaml과 동일)
  - name: a_max
    type: float
    default: 1.5
    min: 0.1
    max: 10.0
    description: 병진 가속 한계 (m/s^2, 실행 명령에만 clamp).
  # --- shared closed-loop simulator block (identical defaults across every
  # local_planning algo; param_schema.json has no separate "sim" section, so
  # these live as ordinary params entries like the algorithm params above) ---
  - name: control_dt
    type: float
    default: 0.1
    min: 0.001
    max: 1.0
    description: 제어 주기 (seconds).
  - name: max_steps
    type: int
    default: 1000
    min: 1
    max: 100000
    description: 최대 tick 수 (소진 시 TIMEOUT).
  - name: goal_tolerance
    type: float
    default: 0.3
    min: 0.01
    max: 5.0
    description: goal 도달 판정 반경 (meters).
  - name: footprint_radius
    type: float
    default: 0.2
    min: 0.01
    max: 5.0
    description: 로봇 충돌 footprint 반경 (meters).
  - name: stall_window
    type: int
    default: 20
    min: 1
    max: 100000
    description: 정체 판정 sliding window 길이 (ticks).
  - name: stall_distance
    type: float
    default: 0.05
    min: 0.0
    max: 5.0
    description: stall_window 구간 순변위가 이 이하이면 STALLED (meters).
